# oe-kernel-lab 默认配置（可由环境变量覆盖）
# 架构: x86_64 | aarch64
ARCH=x86_64
# openEuler 版本标识（用于 repo 路径等）
OPENEULER_VERSION=24.03-LTS-SP3
# 构建产物目录（相对于项目根或 WORKDIR）
ROOTFS_DIR=rootfs
QCOW2_IMG=rootfs.qcow2
INITRAMFS_IMG=initramfs.img
# 包列表 profile: base + debug | minimal（对应 config/packages/*.txt）
PACKAGE_LIST=debug
# 镜像大小（GB）
QCOW2_SIZE_GB=16
# root 密码
ROOT_PASSWORD=OpenEuler@123
# 内核模块目录（用于 initramfs，相对于 WORKDIR）
MODULES_DIR=my_modules
# QEMU 运行默认值
KERNEL_IMAGE=bzImage
MEMORY_MB=4096
SMP=4
VMLINUX=
